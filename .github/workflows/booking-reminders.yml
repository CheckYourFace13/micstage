name: Booking reminders

on:
  schedule:
    # Once per hour at :00 UTC. GitHub may delay runs slightly during high load.
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/cron/booking-reminders
        run: |
          curl -v -f -S -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -m 120 \
            "https://micstage.com/api/cron/booking-reminders"
