name: Growth pipeline

# Production crons run on Hostinger hPanel (not GitHub Actions).
# Hostinger CDN blocks datacenter IPs → scheduled GitHub runs always fail with 403/timeout.
# Use hPanel cron: /api/cron/growth-pipeline?phase=tick (every 15 min) and ?phase=discovery (hourly).
on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Require CRON_SECRET
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::Add GitHub repo secret CRON_SECRET (Settings → Secrets → Actions). Use the same value as Hostinger CRON_SECRET / MICSTAGE_CRON_SECRET."
            exit 1
          fi

      - name: POST growth tick (emails + outreach)
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/cron-body.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: MicStage-GitHub-Cron/1.0" \
            -m 360 \
            "https://micstage.com/api/cron/growth-pipeline?phase=tick") || true
          cat /tmp/cron-body.txt || true
          if [ "$HTTP_CODE" = "403" ]; then
            echo "::warning::HTTP 403 — Hostinger CDN blocked GitHub IP. Production uses hPanel cron, not Actions."
            exit 0
          fi
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::HTTP $HTTP_CODE"
            exit 1
          fi

      - name: POST discovery (nationwide venues)
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/cron-body.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: MicStage-GitHub-Cron/1.0" \
            -m 300 \
            "https://micstage.com/api/cron/growth-pipeline?phase=discovery") || true
          cat /tmp/cron-body.txt || true
          if [ "$HTTP_CODE" = "403" ]; then
            echo "::warning::HTTP 403 — Hostinger CDN blocked GitHub IP. Production uses hPanel cron, not Actions."
            exit 0
          fi
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::HTTP $HTTP_CODE"
            exit 1
          fi
