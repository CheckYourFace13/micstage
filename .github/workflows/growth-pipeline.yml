name: Growth pipeline

on:
  schedule:
    # Every 15 minutes: email mining + outreach in one call.
    - cron: "*/15 * * * *"
    # Hourly: nationwide venue discovery.
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Require CRON_SECRET
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::Add GitHub repo secret CRON_SECRET (Settings → Secrets → Actions). Use the same value as Hostinger CRON_SECRET / MICSTAGE_CRON_SECRET."
            exit 1
          fi

      - name: POST growth tick (emails + outreach)
        if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/cron-body.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: MicStage-GitHub-Cron/1.0" \
            -m 360 \
            "https://micstage.com/api/cron/growth-pipeline?phase=tick") || true
          cat /tmp/cron-body.txt || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::HTTP $HTTP_CODE (403 = Hostinger CDN blocked GitHub IP; use Hostinger hPanel cron or scripts/run-production-crons.ps1)"
            exit 1
          fi

      - name: POST discovery (nationwide venues)
        if: github.event.schedule == '5 * * * *' || github.event_name == 'workflow_dispatch'
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/cron-body.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: MicStage-GitHub-Cron/1.0" \
            -m 300 \
            "https://micstage.com/api/cron/growth-pipeline?phase=discovery") || true
          cat /tmp/cron-body.txt || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::HTTP $HTTP_CODE (403 = Hostinger CDN blocked GitHub IP; use Hostinger hPanel cron or scripts/run-production-crons.ps1)"
            exit 1
          fi
