version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: openmic-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openmic
    volumes:
      - openmic_postgres_data:/var/lib/postgresql/data

volumes:
  openmic_postgres_data:

